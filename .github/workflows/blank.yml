name: Gerar APK Kotlin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o código do GitHub
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Validar e corrigir permissões do Gradle
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

      - name: Compilar e Criar o APK Debug
        run: ./gradlew assembleDebug --no-daemon
