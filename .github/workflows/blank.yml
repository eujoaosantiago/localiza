name: Gerar APK Kotlin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o código do GitHub
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Dar permissão para rodar o Gradle
        run: chmod +x gradlew

      - name: Compilar e Criar o APK Debug
        run: ./gradlew assembleDebug

      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-kotlin
          path: app/build/outputs/apk/debug/app-debug.apk
