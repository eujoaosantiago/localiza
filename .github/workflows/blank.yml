name: Gerar APK Kotlin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o código do GitHub
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Validar e corrigir permissões do Gradle
        run: |
          chmod +x gradlew
          sed -i 's/\r$//' gradlew

      - name: Criar google-services.json com o Package Name correto
        run: |
          echo '{"project_info":{"project_number":"123456789","project_id":"localiza-unifor","storage_bucket":"localiza-unifor.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456789:android:abcdef","android_client_info":{"package_name":"com.localiza.uniforadsv2"}},"api_key":[{"current_key":"mock-key-aBcDeF"}],"services":{}}],"configuration_version":"1"}' > app/google-services.json

      - name: Compilar e Criar o APK de Verdade
        run: ./gradlew assembleDebug --no-daemon

      - name: Disponibilizar o APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-localiza
          path: app/build/outputs/apk/debug/app-debug.apk
